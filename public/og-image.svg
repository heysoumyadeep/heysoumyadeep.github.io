<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c031b"/>
      <stop offset="100%" style="stop-color:#2d142c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ee4540"/>
      <stop offset="100%" style="stop-color:#c72c41"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="64" height="64" rx="14" fill="#2d142c" stroke="#c72c41" stroke-width="2"/>
  <text x="112" y="126" font-family="Poppins, sans-serif" font-size="36" font-weight="700" fill="#ee4540" text-anchor="middle">S</text>

  <!-- Name -->
  <text x="80" y="260" font-family="Poppins, sans-serif" font-size="72" font-weight="700" fill="#fdf6f0" letter-spacing="-2">Soumyadeep Pradhan</text>

  <!-- Role -->
  <text x="80" y="330" font-family="Poppins, sans-serif" font-size="32" font-weight="400" fill="#c72c41">Full-Stack Developer · SDE2 at JPMorgan Chase</text>

  <!-- Tagline -->
  <text x="80" y="410" font-family="Poppins, sans-serif" font-size="26" font-weight="300" fill="rgba(253,246,240,0.6)">Building thoughtful software across the stack.</text>

  <!-- URL -->
  <text x="80" y="540" font-family="Poppins, sans-serif" font-size="22" font-weight="500" fill="rgba(253,246,240,0.35)">soumya.io</text>

  <!-- Decorative orb -->
  <circle cx="1050" cy="315" r="220" fill="rgba(238,69,64,0.06)"/>
  <circle cx="1050" cy="315" r="140" fill="rgba(199,44,65,0.08)"/>
</svg>
